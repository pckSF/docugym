services:
  dev:
    build:
      context: .
      target: dev
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: docugym-dev:latest
    container_name: docugym-dev
    hostname: docugym-dev
    environment:
      UV_PROJECT_ENVIRONMENT: /home/devuser/.venv
    shm_size: "2gb"
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  runp:
    build:
      context: .
      target: run
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: docugym-run:latest
    container_name: docugym-run
    hostname: docugym-run
    environment:
      UV_PROJECT_ENVIRONMENT: /home/devuser/.venv
    shm_size: "2gb"
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  autid:
    image: python:3.12-alpine
    container_name: docugym-autid
    hostname: docugym-autid
    working_dir: /app
    environment:
      HOME: /tmp
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
      PATH: /tmp/.local/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - .:/app:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command:
      - /bin/sh
      - -lc
      - |
        python -m pip install --user pip-audit && \
        python -m pip_audit --require-hashes -r requirements.txt

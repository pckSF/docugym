services:
  dev:
    build:
      context: .
      target: dev
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: docugym-dev:latest
    container_name: docugym-dev
    hostname: docugym-dev
    environment:
      UV_PROJECT_ENVIRONMENT: /home/devuser/.venv
    shm_size: "2gb"
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  runp:
    build:
      context: .
      target: run
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: docugym-run:latest
    container_name: docugym-run
    hostname: docugym-run
    environment:
      UV_PROJECT_ENVIRONMENT: /home/devuser/.venv
    shm_size: "2gb"
    volumes:
      - .:/app
    working_dir: /app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  audit:
    build:
      context: .
      target: audit
    image: docugym-audit:latest
    container_name: docugym-audit
    hostname: docugym-audit
    working_dir: /app
    volumes:
      - .:/app:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --require-hashes
      - -r
      - requirements.txt
